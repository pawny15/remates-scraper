name: Scraper Remates

on:
  schedule:
    # Corre todos los días a las 7:00 AM hora Chile (10:00 UTC)
    - cron: "0 10 * * *"
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Correr scraper
        run: python scraper.py

      - name: Actualizar index.html con datos frescos
        run: python generar_html.py

      - name: Subir a Google Sheets
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: |
          pip install gspread google-auth
          python subir_sheets.py

      - name: Commit y push de archivos actualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add remates_limpio.csv index.html
          git diff --staged --quiet || git commit -m "Auto: actualizar remates $(date '+%Y-%m-%d')"
          git push
