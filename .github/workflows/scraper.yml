name: Scrape Remates

on:
  schedule:
    # Lunes, miércoles y viernes a las 07:00 hora Chile (UTC-3 = 10:00 UTC)
    - cron: "0 10 * * 1,3,5"
  workflow_dispatch: # permite ejecutar manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Ejecutar scraper
        run: python scraper_v5.py

      - name: Verificar resultado
        run: |
          echo "Total remates:"
          python -c "import json; d=json.load(open('remates.json')); print(d['total'])"

      - name: Commit y push remates.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add remates.json
          git diff --cached --quiet || git commit -m "chore: actualizar remates $(date +'%Y-%m-%d')"
          git push
