name: Scraper Diario mipropiedadchile

on:
  schedule:
    - cron: '59 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Generar index.html
        run: python build_html.py

      - name: Commit y push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html remates_limpio.csv
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            FECHA=$(TZ='America/Santiago' date '+%d/%m/%Y %H:%M')
            git commit -m "Actualizacion automatica $FECHA"
            git push
          fi
