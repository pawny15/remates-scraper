name: Scraper diario de remates

on:
  # Corre automáticamente todos los días a las 07:00 hora Chile (10:00 UTC)
  schedule:
    - cron: "0 10 * * *"

  # También se puede disparar manualmente desde la pestaña Actions en GitHub
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Descargar el código del repo
      - name: Checkout del repositorio
        uses: actions/checkout@v4.2.2

      # 2. Instalar Python
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      # 4. Correr el scraper (genera remates_limpio.csv con solo remates vigentes)
      - name: Ejecutar scraper
        run: python scraper.py

      # 5. Subir el CSV actualizado al repo automáticamente
      - name: Commit y push del CSV actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add remates_limpio.csv
          # Solo hace commit si el archivo cambió (evita commits vacíos)
          git diff --cached --quiet || git commit -m "🏠 Remates actualizados $(date +'%d/%m/%Y %H:%M') UTC"
          git push
