name: Actualizar Remates Diariamente

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Actualizar valor UF del día
        run: |
          UF=$(curl -s "https://mindicador.cl/api/uf" | python3 -c "import sys,json; print(json.load(sys.stdin)['serie'][0]['valor'])")
          echo "UF del día: $UF"
          sed -i "s/UF *= *[0-9.]*/UF = $UF/" scraper.py

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Commit y push del CSV al repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add remates_limpio.csv scraper.py
          git diff --cached --quiet || git commit -m "🏠 Remates actualizados $(date '+%Y-%m-%d')"
          git push
