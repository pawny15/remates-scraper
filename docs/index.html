<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Remates Inmobiliarios Chile</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #F7F4EF;
    --surface:  #FFFFFF;
    --ink:      #1A1410;
    --muted:    #7A6E65;
    --accent:   #C04B2B;
    --accent2:  #2B5EC0;
    --border:   #E2DDD7;
    --tag-bg:   #EDE8E1;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: #fff;
    padding: 2.5rem 2rem 2rem;
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    gap: 1rem;
  }
  .header-left { flex: 1; min-width: 220px; }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  header h1 em { color: #E8A87C; font-style: italic; }
  .header-meta {
    font-size: .8rem;
    color: #aaa;
    margin-top: .4rem;
    font-weight: 300;
  }
  .counter-badge {
    background: var(--accent);
    color: #fff;
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    padding: .5rem 1.2rem;
    border-radius: 8px;
    text-align: center;
    min-width: 80px;
  }
  .counter-badge small { display: block; font-family: 'DM Sans', sans-serif; font-size: .65rem; font-weight: 300; letter-spacing: .05em; text-transform: uppercase; }

  /* ── FILTROS ── */
  .filters {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: .75rem;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .filters label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-right: -.3rem; }
  .filters select, .filters input {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .4rem .75rem;
    font-family: inherit;
    font-size: .85rem;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    transition: border .15s;
  }
  .filters select:focus, .filters input:focus { border-color: var(--accent); }
  .filters input[type=text] { width: 200px; }
  .btn-reset {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .4rem .9rem;
    font-size: .8rem;
    cursor: pointer;
    color: var(--muted);
    font-family: inherit;
    transition: all .15s;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  /* ── GRID ── */
  main { padding: 2rem; }
  #no-results { text-align: center; padding: 4rem 2rem; color: var(--muted); font-style: italic; display: none; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.25rem;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.4rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: .75rem;
    transition: box-shadow .2s, transform .2s;
    animation: fadeUp .35s ease both;
  }
  .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.1); transform: translateY(-2px); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
  .tipo-badge {
    background: var(--tag-bg);
    color: var(--ink);
    font-size: .7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: .25rem .6rem;
    border-radius: 4px;
  }
  .fecha-remate {
    font-size: .78rem;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }
  .fecha-remate::before { content: "📅 "; }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    line-height: 1.3;
    color: var(--ink);
  }
  .card-region { font-size: .8rem; color: var(--muted); }
  .card-region::before { content: "📍 "; }

  .precio-row {
    display: flex;
    gap: 1rem;
    align-items: baseline;
    flex-wrap: wrap;
  }
  .precio-clp {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    color: var(--ink);
  }
  .precio-uf {
    font-size: .85rem;
    color: var(--muted);
  }

  .card-meta {
    display: flex;
    gap: .75rem;
    flex-wrap: wrap;
    font-size: .78rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: .7rem;
  }
  .card-meta span::before { margin-right: .2rem; }

  .card-links { display: flex; gap: .6rem; flex-wrap: wrap; }
  .btn-link {
    display: inline-flex;
    align-items: center;
    gap: .3rem;
    border-radius: 6px;
    font-size: .78rem;
    font-weight: 500;
    padding: .35rem .8rem;
    text-decoration: none;
    transition: opacity .15s;
  }
  .btn-link:hover { opacity: .75; }
  .btn-ficha { background: var(--accent); color: #fff; }
  .btn-maps  { background: var(--accent2); color: #fff; }

  .pub-date { font-size: .7rem; color: #bbb; margin-top: auto; }

  /* ── LOADING ── */
  #loading {
    text-align: center;
    padding: 5rem;
    color: var(--muted);
    font-style: italic;
  }
  .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-bottom: .75rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 2.5rem 1rem;
    font-size: .78rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 2rem;
  }

  @media (max-width: 600px) {
    header { padding: 1.5rem 1rem 1.2rem; }
    main { padding: 1rem; }
    .filters { padding: .75rem 1rem; }
    .filters input[type=text] { width: 140px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Remates<br/><em>Inmobiliarios</em> Chile</h1>
    <p class="header-meta" id="meta-info">Cargando datos…</p>
  </div>
  <div class="counter-badge">
    <span id="contador">—</span>
    <small>vigentes</small>
  </div>
</header>

<div class="filters">
  <label>Región</label>
  <select id="f-region">
    <option value="">Todas</option>
  </select>

  <label>Tipo</label>
  <select id="f-tipo">
    <option value="">Todos</option>
  </select>

  <label>Buscar</label>
  <input type="text" id="f-texto" placeholder="comuna, dirección…"/>

  <button class="btn-reset" onclick="resetFiltros()">✕ Limpiar</button>
</div>

<main>
  <div id="loading"><div class="spinner"></div><br/>Cargando remates…</div>
  <p id="no-results">No se encontraron remates con esos filtros.</p>
  <div class="grid" id="grid"></div>
</main>

<footer>
  Datos extraídos de <a href="https://www.rematesinmobiliarios.cl" target="_blank">rematesinmobiliarios.cl</a> · Actualización automática diaria
</footer>

<script>
let todos = [];

async function cargar() {
  try {
    const res  = await fetch('remates.json');
    const data = await res.json();

    todos = data.remates || [];
    document.getElementById('loading').style.display = 'none';
    document.getElementById('meta-info').textContent =
      `Actualizado: ${data.actualizado} · ${data.total} remates vigentes`;

    poblarFiltros();
    renderizar();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#c04b2b">Error cargando datos. Intenta recargar la página.</p>';
  }
}

function poblarFiltros() {
  const regiones = [...new Set(todos.map(r => r.region).filter(Boolean))].sort();
  const tipos    = [...new Set(todos.map(r => r.tipo).filter(Boolean))].sort();
  const selReg   = document.getElementById('f-region');
  const selTipo  = document.getElementById('f-tipo');
  regiones.forEach(v => { const o = new Option(v,v); selReg.add(o); });
  tipos.forEach(v    => { const o = new Option(v,v); selTipo.add(o); });
}

function renderizar() {
  const region = document.getElementById('f-region').value;
  const tipo   = document.getElementById('f-tipo').value;
  const texto  = document.getElementById('f-texto').value.toLowerCase().trim();

  const filtrados = todos.filter(r => {
    if (region && r.region !== region) return false;
    if (tipo   && r.tipo   !== tipo)   return false;
    if (texto) {
      const hay = [r.comuna, r.direccion, r.region, r.tipo]
        .map(x => (x||'').toLowerCase()).join(' ');
      if (!hay.includes(texto)) return false;
    }
    return true;
  });

  document.getElementById('contador').textContent = filtrados.length;
  const noRes = document.getElementById('no-results');
  const grid  = document.getElementById('grid');

  if (!filtrados.length) {
    noRes.style.display = 'block';
    grid.innerHTML = '';
    return;
  }
  noRes.style.display = 'none';

  grid.innerHTML = filtrados.map((r, i) => `
    <div class="card" style="animation-delay:${Math.min(i,20)*25}ms">
      <div class="card-top">
        <span class="tipo-badge">${r.tipo || 'Inmueble'}</span>
        <span class="fecha-remate">${r.fecha_remate || 'Fecha por confirmar'}</span>
      </div>

      <div>
        <p class="card-title">${r.direccion || r.comuna || 'Dirección no especificada'}</p>
        <p class="card-region">${r.comuna ? r.comuna + (r.region ? ', ' + r.region : '') : (r.region || '')}</p>
      </div>

      <div class="precio-row">
        <span class="precio-clp">${r.precio_clp || 'Precio no informado'}</span>
        ${r.precio_uf ? `<span class="precio-uf">${r.precio_uf} UF</span>` : ''}
      </div>

      <div class="card-meta">
        ${r.metros2 ? `<span>📐 ${r.metros2} m²</span>` : ''}
        ${r.id      ? `<span>ID ${r.id}</span>` : ''}
      </div>

      ${(r.url_ficha || r.url_maps) ? `
      <div class="card-links">
        ${r.url_ficha ? `<a class="btn-link btn-ficha" href="${r.url_ficha}" target="_blank">🔗 Ver ficha</a>` : ''}
        ${r.url_maps  ? `<a class="btn-link btn-maps"  href="${r.url_maps}"  target="_blank">🗺 Ver mapa</a>`  : ''}
      </div>` : ''}

      <p class="pub-date">Publicado: ${r.fecha_publicacion || '—'}</p>
    </div>
  `).join('');
}

function resetFiltros() {
  document.getElementById('f-region').value = '';
  document.getElementById('f-tipo').value   = '';
  document.getElementById('f-texto').value  = '';
  renderizar();
}

['f-region','f-tipo','f-texto'].forEach(id =>
  document.getElementById(id).addEventListener('input', renderizar)
);

cargar();
</script>
</body>
</html>
